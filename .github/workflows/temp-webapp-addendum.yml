name: Webapp Addendum
on:
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send addendum
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_ISSUES_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_ISSUES_THREAD_ID }}
        with:
          script: |
            const lines = [
              "\u2795 <b>gitchat-webapp</b> \u00b7 addendum",
              "(commits on develop \u2014 missed in earlier digest)",
              "",
              "\U0001f527 <b>10 commits today</b>",
              "",
              "\u00b7 fix(backend): remove presence-based push skip (iOS lockscreen miss) \u2014 EthanMiller0x",
              "\u00b7 fix(backend): HTTP cache privacy leak + stale conversations list after group edit \u2014 lngdao",
              "\u00b7 feat(backend): reliable push delivery via subscription-id registry \u2014 lngdao",
              "\u00b7 feat(backend): GET /app/version \u2014 iTunes-backed manifest \u2014 lngdao",
              "\u00b7 feat(backend): add app_version_policies entity + migration \u2014 lngdao",
              "\u00b7 chore(backend): wire AppVersion entity/repo/module into DI \u2014 lngdao",
              "\u00b7 test(backend): unit tests for AppVersionService manifest \u2014 lngdao",
              "\u00b7 fix(messages): cache-first join gate + scope-downgrade guard \u2014 EthanMiller0x",
              "\u00b7 feat(backend): GET /app/version endpoint (PR #63) \u2014 lngdao",
              "\u00b7 fix(backend): NOT_A_CONTRIBUTOR scope-downgrade (PR #64) \u2014 EthanMiller0x",
            ];
            const text = lines.join("\n");
            const res = await fetch(
              `https://api.telegram.org/bot${process.env.TELEGRAM_BOT_TOKEN}/sendMessage`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  chat_id: process.env.CHAT_ID,
                  message_thread_id: Number(process.env.THREAD_ID),
                  parse_mode: "HTML",
                  disable_web_page_preview: true,
                  text,
                }),
              }
            );
            if (!res.ok) core.setFailed(`Telegram error: ${res.status} ${await res.text()}`);
            else console.log("sent ok");
