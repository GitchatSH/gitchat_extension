name: Catchup PR72
on:
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        with:
          script: |
            const text =
              `✅ <b>PR MERGED</b> · <a href="https://github.com/GitchatSH/gitchat-ios-native/pull/72">#72</a>\n` +
              `<b>Mac Catalyst desktop shell — bottom nav, sticky detail, row standardization</b>\n` +
              `👤 <a href="https://github.com/nakamoto-hiru">@nakamoto-hiru</a> · merged by <a href="https://github.com/norwayiscoming">@norwayiscoming</a> → main\n` +
              `📦 1 commit · <code>+1405 -115</code> · 20 files\n\n` +
              `<i>⏰ Catch-up — missed earlier (workflow not yet active at time of merge)</i>`;
            const res = await fetch(
              \`https://api.telegram.org/bot\${process.env.TELEGRAM_BOT_TOKEN}/sendMessage\`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: process.env.CHAT_ID,
                  message_thread_id: Number(process.env.THREAD_ID),
                  parse_mode: 'HTML',
                  disable_web_page_preview: true,
                  text,
                }),
              }
            );
            if (!res.ok) core.setFailed(\`Telegram error: \${res.status} \${await res.text()}\`);
            else console.log('sent ok');
