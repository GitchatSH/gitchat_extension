name: Catchup PR72
on:
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        with:
          script: |
            const pr_url = "https://github.com/GitchatSH/gitchat-ios-native/pull/72";
            const author_url = "https://github.com/nakamoto-hiru";
            const merger_url = "https://github.com/norwayiscoming";
            const text = "\u2705 <b>PR MERGED</b> \u00b7 <a href=\"" + pr_url + "\">#72</a>\n" +
              "<b>Mac Catalyst desktop shell \u2014 bottom nav, sticky detail, row standardization</b>\n" +
              "\U0001f464 <a href=\"" + author_url + "\">@nakamoto-hiru</a> \u00b7 merged by <a href=\"" + merger_url + "\">@norwayiscoming</a> \u2192 main\n" +
              "\U0001f4e6 1 commit \u00b7 <code>+1405 -115</code> \u00b7 20 files\n\n" +
              "<i>\u23f0 Catch-up \u2014 missed earlier (PR workflow not yet active at time of merge)</i>";
            const res = await fetch(
              "https://api.telegram.org/bot" + process.env.TELEGRAM_BOT_TOKEN + "/sendMessage",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  chat_id: process.env.CHAT_ID,
                  message_thread_id: Number(process.env.THREAD_ID),
                  parse_mode: "HTML",
                  disable_web_page_preview: true,
                  text: text,
                }),
              }
            );
            if (!res.ok) core.setFailed("Telegram error: " + res.status + " " + await res.text());
            else console.log("sent ok");
