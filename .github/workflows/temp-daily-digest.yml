name: Daily Digest
on:
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily digest
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_ISSUES_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_ISSUES_THREAD_ID }}
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json
          msg = (
            "\U0001f4ca <b>GitchatSH \u2014 Daily Summary \u00b7 24 Apr 2026</b>\n\n"
            "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n"
            "\U0001f4f1 <b>gitchat-ios-native</b> \u00b7 25 commits\n\n"
            "<b>Highlights</b>\n"
            "\u00b7 feat: Mac Catalyst desktop shell \u2014 nav &amp; row standardization\n"
            "\u00b7 bump v1.0.5 build 74\n"
            "\u00b7 fix: copy image crashes (x2 PRs)\n"
            "\u00b7 fix: image upload timeouts \u2014 dedicated URLSession + retry\n"
            "\u00b7 feat: PushSubscriptionSync mirrors OneSignal sub ID to BE\n"
            "\u00b7 fix: Catalyst right-click context menu\n"
            "\u00b7 feat: toast revamp \u2192 swiftui-toasts\n"
            "\u00b7 fix: reply quote nested inside bubble\n\n"
            "<b>Issues opened \u00b7 6</b>\n"
            "\u00b7 #74 [sync] BE now sends push regardless of presence\n"
            "\u00b7 #73 [Bug] Forward image broken \u2014 also affects extension\n"
            "\u00b7 #71 [Bug] Pin message \u2192 Couldn\'t pin toast in v74\n"
            "\u00b7 #66 [sync] GET /app/version live \u2014 iOS gate needed\n"
            "\u00b7 #61 Send video messages\n"
            "\u00b7 #60 [UX] Message lost if user exits chat fast after send\n\n"
            "<b>Issues closed \u00b7 2</b>\n"
            "\u00b7 #59 Team join NOT_A_CONTRIBUTOR fixed \u2705\n"
            "\u00b7 #58 Image upload unstable on mobile fixed \u2705\n\n"
            "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n"
            "\U0001f9e9 <b>gitchat\_extension</b> \u00b7 2 commits\n\n"
            "<b>Highlights</b>\n"
            "\u00b7 PR #190 merged: plan/channel\_feature (cairo-cmd)\n"
            "\u00b7 Discussions tab enabled \u00b7 5 categories live\n\n"
            "<b>Issues opened \u00b7 2</b>\n"
            "\u00b7 #191 [Bug] Online Now showing in both Discover + Friends\n"
            "\u00b7 #188 Send video messages (parity iOS)\n\n"
            "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n"
            "\U0001f310 <b>gitchat-webapp</b>\n"
            "No commits \u00b7 No issues today"
          )
          payload = json.dumps({
            "chat_id": os.environ["CHAT_ID"],
            "message_thread_id": int(os.environ["THREAD_ID"]),
            "parse_mode": "HTML",
            "disable_web_page_preview": True,
            "text": msg
          }).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
            data=payload,
            headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
            print(r.read().decode())
          PYEOF
