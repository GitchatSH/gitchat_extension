name: Telegram Push Notify

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        with:
          script: |
            if (context.payload.deleted) return;
            const commits = context.payload.commits || [];
            if (commits.length === 0) return;

            const branch = context.payload.ref.replace('refs/heads/', '');
            const repoFull = context.payload.repository.full_name;
            const repoUrl = context.payload.repository.html_url;
            const jokes = [
              "🍺 Friday afternoon deploy — living on the edge 🌊",
              "☕ Caffeine-powered commit detected",
              "🐛 Bugs incoming in 3… 2… 1…",
              "🎲 YOLO-driven development strikes again",
              "🔥 It compiles on my machine, ship it!",
              "🛸 Code pushed faster than light, slower than QA",
              "🧙 Abracadabra — may the merge conflicts spare us",
              "🍿 Grab popcorn, CI is about to roast someone",
              "🥷 Silent push, deadly diff",
              "🚧 Hard hats on, refactor zone",
              "🐢 Slow and steady wins the rebase",
              "🎩 Pulling features out of a hat",
              "🦖 Legacy code says rawr",
              "🧹 Sweeping bugs under the rug — professionally",
              "🪄 git push --force-of-habit",
              "💤 Pushed at this hour? Touch grass, dev",
              "🎯 100% test coverage… of the happy path",
              "🛟 Hope is not a strategy, but here we are",
            ];

            const esc = (s) => String(s)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;');

            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chat_id = process.env.CHAT_ID;
            const message_thread_id = process.env.THREAD_ID;

            const joke = jokes[Math.floor(Math.random() * jokes.length)];
            const pusher = context.payload.pusher?.name
              || context.payload.sender?.login
              || commits[0].author?.username
              || commits[0].author?.name
              || 'unknown';

            const lines = [];
            for (const c of commits) {
              const short = c.id.slice(0, 7);
              const msg = (c.message || '').split('\n')[0];
              lines.push(`📝 ${esc(msg)}\n🔖 <a href="${esc(c.url)}">${short}</a>`);
            }

            const header = commits.length === 1
              ? `🛎️ <b>NEW PUSH INCOMING</b> 🛎️`
              : `🛎️ <b>NEW PUSH INCOMING</b> 🛎️ <i>(${commits.length} commits)</i>`;

            const text =
              `${header}\n` +
              `📦 <a href="${esc(repoUrl)}">${esc(repoFull)}</a>\n` +
              `🌿 <b>${esc(branch)}</b> · 👤 <a href="https://github.com/${esc(pusher)}">${esc(pusher)}</a>\n\n` +
              `${lines.join('\n\n')}\n\n` +
              `${esc(joke)}`;

            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id,
                message_thread_id: Number(message_thread_id),
                parse_mode: 'HTML',
                disable_web_page_preview: true,
                text,
              }),
            });
            if (!res.ok) {
              core.setFailed(`Telegram API error: ${res.status} ${await res.text()}`);
              return;
            }
